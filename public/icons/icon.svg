<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#0f172a"/>
  <rect x="51" y="51" width="410" height="410" rx="85" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Shopping cart -->
  <g stroke="#fff" fill="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Handle -->
    <line x1="128" y1="155" x2="178" y2="155" stroke-width="28"/>
    <!-- Cart body -->
    <polyline points="178,155 208,330 390,330 418,215 178,215" fill="none" stroke-width="26"/>
    <!-- Wheels -->
    <circle cx="248" cy="375" r="28" stroke="none"/>
    <circle cx="368" cy="375" r="28" stroke="none"/>
  </g>
</svg>
